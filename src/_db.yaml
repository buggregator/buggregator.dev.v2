version: "1.0"
namespace: app

entries:
  # ── Database ────────────────────────────────────────────────
  - name: db
    kind: db.sql.postgres
    host_env: app.env:db_host
    port_env: app.env:db_port
    database_env: app.env:db_name
    username_env: app.env:db_user
    password_env: app.env:db_password
    pool:
      max_open: 10
      max_idle: 5
      max_lifetime: "1h"
    options:
      sslmode: "disable"
    lifecycle:
      auto_start: true
