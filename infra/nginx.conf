map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────
server {
    listen 80;
    server_name buggregator.dev *.buggregator.dev;
    return 301 https://$host$request_uri;
}

# ── Main site (buggregator.dev) ────────────────────────────
# Frontend (Nuxt SSR) handles everything browser-facing.
# Backend (Wippy) is accessed only through Nuxt proxy.
#
# Ports (from docker-compose):
#   app (Wippy backend)     — not exposed (accessed via docker network)
#   frontend (Nuxt SSR)     — not exposed (accessed via docker network)
#   buggregator (demo)      — ${BUGGREGATOR_DEMO_PORT_HTTP:-7072}
#   buggregator-docs        — ${BUGGREGATOR_DOCS_PORT_HTTP:-7073}
#   buggregator-examples    — not exposed (accessed via docker network)
#
server {
    server_name buggregator.dev;

    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/buggregator.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buggregator.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    error_page 502 503 504 /maintenance.html;

    location = /maintenance.html {
        root /servers/buggregator/infra;
        internal;
    }

    # ── WebSocket relay (through Nuxt) ─────────────────────
    location /ws/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        proxy_pass http://localhost:7071;
    }

    # ── Demo call endpoint (proxied to examples container) ──
    location /example/call {
        proxy_pass http://localhost:7074;
        proxy_set_header Host $http_host;
    }

    # ── Everything else — Nuxt SSR + API proxy ─────────────
    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://localhost:7071;
    }
}

# ── Docs (docs.buggregator.dev) ────────────────────────────
server {
    server_name docs.buggregator.dev;

    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/buggregator.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buggregator.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    error_page 502 503 504 /maintenance.html;

    location = /maintenance.html {
        root /servers/buggregator/infra;
        internal;
    }

    location / {
        proxy_pass http://localhost:7073;
        proxy_set_header Host $http_host;
    }
}

# ── Demo Buggregator instance (test.buggregator.dev) ───────
server {
    server_name test.buggregator.dev;

    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/buggregator.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buggregator.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    error_page 502 503 504 /maintenance.html;

    location = /maintenance.html {
        root /servers/buggregator/infra;
        internal;
    }

    location / {
        proxy_pass http://localhost:7072;
        proxy_set_header Host $http_host;
    }

    location /connection {
        proxy_pass http://localhost:7072/connection;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }
}
