<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buggregator — Maintenance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'IBM Plex Mono', ui-monospace, monospace;
            background: #09090b;
            color: #a1a1aa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .font-display {
            font-family: 'Bricolage Grotesque', system-ui, sans-serif;
        }

        .dot-grid {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(148, 163, 184, 0.18) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
        }

        .dot-glow {
            position: fixed;
            inset: 0;
            background-size: 28px 28px;
            background-image: radial-gradient(circle, currentColor 1px, transparent 1px);
            mask-size: 55vw 55vw;
            -webkit-mask-size: 55vw 55vw;
            mask-repeat: no-repeat;
            -webkit-mask-repeat: no-repeat;
            mask-image: radial-gradient(circle, black 0%, transparent 60%);
            -webkit-mask-image: radial-gradient(circle, black 0%, transparent 60%);
            will-change: mask-position, opacity;
            pointer-events: none;
        }

        .glow-blue   { color: rgba(59,130,246,0.14); animation: drift-1 22s ease-in-out infinite; }
        .glow-purple { color: rgba(139,92,246,0.11);  animation: drift-2 28s ease-in-out infinite; }
        .glow-cyan   { color: rgba(6,182,212,0.10);   animation: drift-3 25s ease-in-out infinite; }

        @keyframes drift-1 {
            0%   { mask-position: 10% 20%; opacity:.6 }
            25%  { mask-position: 60% 10%; opacity:1  }
            50%  { mask-position: 80% 70%; opacity:.5 }
            75%  { mask-position: 30% 80%; opacity:.8 }
            100% { mask-position: 10% 20%; opacity:.6 }
        }
        @keyframes drift-2 {
            0%   { mask-position: 70% 60%; opacity:.5 }
            25%  { mask-position: 20% 80%; opacity:.9 }
            50%  { mask-position: 10% 30%; opacity:.4 }
            75%  { mask-position: 80% 10%; opacity:.7 }
            100% { mask-position: 70% 60%; opacity:.5 }
        }
        @keyframes drift-3 {
            0%   { mask-position: 40% 90%; opacity:.7 }
            25%  { mask-position: 90% 40%; opacity:.5 }
            50%  { mask-position: 50% 10%; opacity:1  }
            75%  { mask-position: 10% 50%; opacity:.6 }
            100% { mask-position: 40% 90%; opacity:.7 }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 420px;
            padding: 2rem;
        }

        .icon-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: rgba(245,158,11,0.06);
            border: 1px solid rgba(245,158,11,0.12);
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(12px);
            animation: stagger-in 0.5s ease-out forwards;
            animation-delay: 0.1s;
        }
        .icon-wrap svg { width: 24px; height: 24px; color: #f59e0b; }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #f4f4f5;
            letter-spacing: -0.02em;
            opacity: 0;
            transform: translateY(12px);
            animation: stagger-in 0.5s ease-out forwards;
            animation-delay: 0.2s;
        }
        h1 span { color: #fbbf24; }

        .subtitle {
            font-size: 0.85rem;
            line-height: 1.7;
            color: #71717a;
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(12px);
            animation: stagger-in 0.5s ease-out forwards;
            animation-delay: 0.3s;
        }

        .status-card {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1.25rem;
            border: 1px solid rgba(63,63,70,0.5);
            border-radius: 10px;
            background: rgba(24,24,27);
            opacity: 0;
            transform: translateY(12px);
            animation: stagger-in 0.5s ease-out forwards;
            animation-delay: 0.4s;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f59e0b;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-text {
            font-size: 0.75rem;
            color: #a1a1aa;
            letter-spacing: 0.02em;
        }
        .status-code {
            font-weight: 600;
            color: #d4d4d8;
        }

        .footer {
            margin-top: 2.5rem;
            font-size: 0.65rem;
            color: #3f3f46;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            opacity: 0;
            animation: stagger-in 0.5s ease-out forwards;
            animation-delay: 0.6s;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(245,158,11,0.3); }
            50%      { opacity: 0.6; box-shadow: 0 0 0 6px rgba(245,158,11,0); }
        }

        @keyframes stagger-in {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="dot-grid"></div>
    <div class="dot-glow glow-blue"></div>
    <div class="dot-glow glow-purple"></div>
    <div class="dot-glow glow-cyan"></div>

    <div class="container">
        <div class="icon-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17 17.25 21A2.652 2.652 0 0 0 21 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 1 1-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 0 0 4.486-6.336l-3.276 3.277a3.004 3.004 0 0 1-2.25-2.25l3.276-3.276a4.5 4.5 0 0 0-6.336 4.486c.049.58.025 1.193-.14 1.743" />
            </svg>
        </div>
        <h1 class="font-display">Scheduled <span>maintenance</span></h1>
        <p class="subtitle">We're performing a quick update. The platform will be back shortly.</p>
        <div class="status-card">
            <span class="pulse-dot"></span>
            <span class="status-text"><span class="status-code">503</span> &middot; Service Unavailable</span>
        </div>
        <div class="footer">buggregator.dev &middot; debugging server for PHP</div>
    </div>
</body>
</html>
