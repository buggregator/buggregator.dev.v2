services:
  # ── App (Wippy) ──────────────────────────────────────────────
  app:
    #    ports:
    #      - ${APP_PORT_HTTP:-7070}:8080
    image: ${APP_IMAGE:-ghcr.io/buggregator/app-template/app:latest}
    volumes:
      - app-data:/app/data
    env_file:
      - .env
    environment:
      # App
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-2cc4088b5e9210275798cfbe961afeae040dc27ed078d3d2a9f5659b81cae974}
      APP_BASE_URL: ${APP_BASE_URL:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app-api.rule=Host(`api.app.localhost`)"
      - "traefik.http.routers.app-api.entrypoints=web"
      - "traefik.http.services.app-api.loadbalancer.server.port=8080"
    networks:
      - buggregator-network
    restart: unless-stopped

  # ── Frontend (Nuxt SSR) ──────────────────────────────────────
  frontend:
    ports:
      - ${FRONTEND_PORT_HTTP:-7071}:3000
    image: ${FRONTEND_IMAGE:-ghcr.io/buggregator/buggregator.dev.v2/frontend:latest}
    environment:
      NUXT_API_BASE_URL: http://app:8080
      NUXT_PUBLIC_APP_URL: ${APP_BASE_URL:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`app.localhost`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    depends_on:
      - app
    networks:
      - buggregator-network
    restart: unless-stopped

  # ── Buggregator (Debug Server / Demo) ─────────────────────────
  buggregator:
    ports:
      - ${BUGGREGATOR_DEMO_PORT_HTTP:-7072}:8000
    image: ghcr.io/buggregator/buggregator.dev.v2/server:latest
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.buggregator.rule=Host(`buggregator.app.localhost`)"
      - "traefik.http.routers.buggregator.entrypoints=web"
      - "traefik.http.services.buggregator.loadbalancer.server.port=8000"
    networks:
      - buggregator-network
    restart: unless-stopped

  buggregator-docs:
    restart: unless-stopped
    image: ghcr.io/buggregator/docs:latest
    ports:
      - ${BUGGREGATOR_DOCS_PORT_HTTP:-7073}:80
    networks:
      - buggregator-network

  # ── Buggregator Examples (Demo event sender) ────────────────
  buggregator-examples:
    image: ghcr.io/buggregator/examples:1.7.1
    environment:
      APP_NAME: Laravel
      APP_ENV: production
      APP_KEY: base64:kMvf1mHFIuCf+ZqMiId7yo6v4oKtjuWqnlxJTWsWv7k=
      APP_DEBUG: "false"
      APP_URL: http://examples.app.localhost
      DB_CONNECTION: sqlite
      DB_DATABASE: /tmp/database.sqlite
      CACHE_DRIVER: file
      QUEUE_CONNECTION: sync
      BROADCAST_DRIVER: log
      SESSION_DRIVER: file
      LOG_CHANNEL: slack
      LOG_LEVEL: debug
      LOG_SLACK_WEBHOOK_URL: http://buggregator:8000/slack
      MAIL_MAILER: smtp
      MAIL_HOST: buggregator
      MAIL_PORT: 1025
      MAIL_USERNAME: "null"
      MAIL_PASSWORD: "null"
      MAIL_ENCRYPTION: "null"
      MAIL_FROM_ADDRESS: sender@site.com
      MAIL_FROM_NAME: Examples
      RAY_HOST: ray@buggregator
      RAY_PORT: 8000
      VAR_DUMPER_SERVER: buggregator:9912
      SENTRY_LARAVEL_DSN: http://sentry@buggregator:8000/1
      SENTRY_TRACES_SAMPLE_RATE: 1
      INSPECTOR_URL: http://inspector@buggregator:8000
      INSPECTOR_API_KEY: test
      INSPECTOR_ENABLE: "true"
      PROFILER_ENDPOINT: http://profiler@buggregator:8000
      BUGGREGATOR_URL: ${BUGGREGATOR_URL:-https://test.buggregator.dev}
      HTTP_DUMP_ENDPOINT: http://http-dump@buggregator:8000
      SMS_ENDPOINT: http://buggregator:8000/sms
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.buggregator-examples.rule=Host(`examples.app.localhost`)"
      - "traefik.http.routers.buggregator-examples.entrypoints=web"
      - "traefik.http.services.buggregator-examples.loadbalancer.server.port=8000"
    depends_on:
      - buggregator
    networks:
      - buggregator-network
    restart: unless-stopped
volumes:
  app-data:

networks:
  buggregator-network:
    driver: bridge
