services:
  # ── App (Wippy) ──────────────────────────────────────────────
  app:
    #    ports:
    #      - ${APP_PORT_HTTP:-7070}:8080
    image: ${APP_IMAGE:-ghcr.io/buggregator/buggregator.dev.v2/app:latest}
    volumes:
      - app-data:/app/data
    env_file:
      - .env
    environment:
      # App
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-2cc4088b5e9210275798cfbe961afeae040dc27ed078d3d2a9f5659b81cae974}
      APP_BASE_URL: ${APP_BASE_URL:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app-api.rule=Host(`api.app.localhost`)"
      - "traefik.http.routers.app-api.entrypoints=web"
      - "traefik.http.services.app-api.loadbalancer.server.port=8080"
    networks:
      - buggregator-network
    restart: unless-stopped

  # ── Frontend (Nuxt SSR) ──────────────────────────────────────
  frontend:
    ports:
      - ${FRONTEND_PORT_HTTP:-7071}:3000
    image: ${FRONTEND_IMAGE:-ghcr.io/buggregator/buggregator.dev.v2/frontend:latest}
    environment:
      NUXT_API_BASE_URL: http://app:8080
      NUXT_PUBLIC_APP_URL: ${APP_BASE_URL:-}
      NUXT_PUBLIC_BUGGREGATOR_URL: ${BUGGREGATOR_URL:-https://test.buggregator.dev}
      NUXT_PUBLIC_TYPESENSE_HOST: ${TYPESENSE_PUBLIC_HOST:-search.app.localhost}
      NUXT_PUBLIC_TYPESENSE_PORT: ${TYPESENSE_PUBLIC_PORT:-80}
      NUXT_PUBLIC_TYPESENSE_PROTOCOL: ${TYPESENSE_PUBLIC_PROTOCOL:-http}
      NUXT_PUBLIC_TYPESENSE_SEARCH_KEY: ${TYPESENSE_SEARCH_KEY:-buggregator-search-key}
      NUXT_PUBLIC_TYPESENSE_COLLECTION: ${TYPESENSE_COLLECTION:-buggregator_docs}
      NUXT_PUBLIC_CRT_BADGE_ID: ${PUBLIC_CRT_BADGE_ID:-}
      NUXT_EXAMPLES_URL: http://buggregator-examples:8000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`app.localhost`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    depends_on:
      - app
    networks:
      - buggregator-network
    restart: unless-stopped

  # ── Buggregator (Debug Server / Demo) ─────────────────────────
  buggregator:
    ports:
      - ${BUGGREGATOR_DEMO_PORT_HTTP:-7072}:8000
    image: ghcr.io/buggregator/server:latest
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.buggregator.rule=Host(`buggregator.app.localhost`)"
      - "traefik.http.routers.buggregator.entrypoints=web"
      - "traefik.http.services.buggregator.loadbalancer.server.port=8000"
    networks:
      - buggregator-network
    restart: unless-stopped

  buggregator-docs:
    restart: unless-stopped
    image: ghcr.io/buggregator/docs:latest
    ports:
      - ${BUGGREGATOR_DOCS_PORT_HTTP:-7073}:80
    environment:
      TYPESENSE_UPSTREAM: http://typesense:8108
      TYPESENSE_COLLECTION: ${TYPESENSE_COLLECTION:-buggregator_docs}
      TYPESENSE_API_KEY: ${TYPESENSE_SEARCH_KEY:-buggregator-search-key}
    depends_on:
      - typesense
    networks:
      - buggregator-network

  # ── Typesense (Search Engine) ───────────────────────────────
  typesense:
    image: typesense/typesense:27.1
    restart: unless-stopped
    volumes:
      - typesense-data:/data
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_SEARCH_KEY:-buggregator-search-key}
      TYPESENSE_DATA_DIR: /data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.typesense.rule=Host(`search.app.localhost`)"
      - "traefik.http.routers.typesense.entrypoints=web"
      - "traefik.http.services.typesense.loadbalancer.server.port=8108"
    networks:
      - buggregator-network

  # ── Buggregator Examples (Demo event sender) ────────────────
  buggregator-examples:
    image: ghcr.io/buggregator/examples:1.8.0
    environment:
      APP_NAME: Laravel
      APP_ENV: production
      APP_KEY: base64:kMvf1mHFIuCf+ZqMiId7yo6v4oKtjuWqnlxJTWsWv7k=
      APP_DEBUG: "false"
      APP_URL: http://examples.app.localhost
      DB_CONNECTION: sqlite
      DB_DATABASE: /tmp/database.sqlite
      CACHE_DRIVER: file
      QUEUE_CONNECTION: sync
      BROADCAST_DRIVER: log
      SESSION_DRIVER: file
      LOG_CHANNEL: slack
      LOG_LEVEL: debug
      LOG_SOCKET_URL: buggregator:9913
      LOG_SLACK_WEBHOOK_URL: http://buggregator:8000/slack
      MAIL_MAILER: smtp
      MAIL_HOST: buggregator
      MAIL_PORT: 1025
      MAIL_USERNAME: "null"
      MAIL_PASSWORD: "null"
      MAIL_ENCRYPTION: "null"
      MAIL_FROM_ADDRESS: sender@site.com
      MAIL_FROM_NAME: Examples
      RAY_HOST: ray@buggregator
      RAY_PORT: 8000
      VAR_DUMPER_SERVER: buggregator:9912
      SENTRY_LARAVEL_DSN: http://sentry@buggregator:8000/1
      SENTRY_TRACES_SAMPLE_RATE: 1
      INSPECTOR_URL: http://inspector@buggregator:8000
      INSPECTOR_API_KEY: test
      INSPECTOR_ENABLE: "true"
      PROFILER_ENDPOINT: http://profiler@buggregator:8000
      BUGGREGATOR_URL: ${BUGGREGATOR_URL:-https://test.buggregator.dev}
      HTTP_DUMP_ENDPOINT: http://http-dump@buggregator:8000
      SMS_ENDPOINT: http://buggregator:8000/sms
      BUGGREGATOR_PROXY_URL: http://buggregator:8080
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.buggregator-examples.rule=Host(`examples.app.localhost`)"
      - "traefik.http.routers.buggregator-examples.entrypoints=web"
      - "traefik.http.services.buggregator-examples.loadbalancer.server.port=8000"
    depends_on:
      - buggregator
    networks:
      - buggregator-network
    restart: unless-stopped

  # ── Docs Indexer (builds docs + indexes into Typesense) ──────
  docs-indexer:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run docs:build"
    volumes:
      - ./docs:/app
      - docs-node-modules:/app/node_modules
    environment:
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: "8108"
      TYPESENSE_PROTOCOL: http
      TYPESENSE_API_KEY: ${TYPESENSE_SEARCH_KEY:-buggregator-search-key}
      TYPESENSE_COLLECTION: buggregator_docs
      DOCS_HOSTNAME: https://docs.buggregator.dev
    depends_on:
      - typesense
    networks:
      - buggregator-network

volumes:
  app-data:
  typesense-data:
  docs-node-modules:

networks:
  buggregator-network:
    driver: bridge
