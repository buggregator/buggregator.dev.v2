services:
  # ── App (Wippy) ──────────────────────────────────────────────
  app:
#    ports:
#      - "8060:8080"
    build:
      context: .
      dockerfile: .docker/Dockerfile
    volumes:
      - app-data:/app/data
    env_file:
      - .env
    environment:
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: app
      DB_USER: homestead
      DB_PASSWORD: secret
      # Services
      TEMPORAL_ADDRESS: temporal:7233
      # App
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-2cc4088b5e9210275798cfbe961afeae040dc27ed078d3d2a9f5659b81cae974}
      APP_BASE_URL: ${APP_BASE_URL:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app-api.rule=Host(`api.app.localhost`)"
      - "traefik.http.routers.app-api.entrypoints=web"
      - "traefik.http.services.app-api.loadbalancer.server.port=8080"
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  # ── Frontend (Nuxt SSR) ──────────────────────────────────────
  frontend:
#    ports:
#      - "8070:3000"
    build:
      context: ./frontend
      dockerfile: .docker/Dockerfile
    environment:
      NUXT_API_BASE_URL: http://app:8080
      NUXT_PUBLIC_APP_URL: ${APP_BASE_URL:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`app.localhost`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    depends_on:
      - app
    networks:
      - app-network
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: homestead
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: app
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homestead"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network
    restart: unless-stopped

  # ── Temporal (Workflow Engine) ───────────────────────────────
  temporal:
    image: temporalio/auto-setup:latest
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=homestead
      - POSTGRES_PWD=secret
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:latest
#    ports:
#      - "8061:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.temporal-ui.rule=Host(`temporal.app.localhost`)"
      - "traefik.http.routers.temporal-ui.entrypoints=web"
      - "traefik.http.services.temporal-ui.loadbalancer.server.port=8080"
    depends_on:
      - temporal
    networks:
      - app-network
    restart: unless-stopped

  # ── Adminer (Database UI) ───────────────────────────────────
  adminer:
    image: adminer:latest
#    ports:
#      - "8062:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adminer.rule=Host(`adminer.app.localhost`)"
      - "traefik.http.routers.adminer.entrypoints=web"
      - "traefik.http.services.adminer.loadbalancer.server.port=8080"
    depends_on:
      - postgres
    networks:
      - app-network
    restart: unless-stopped

volumes:
  app-data:
  pg-data:

networks:
  app-network:
    driver: bridge
