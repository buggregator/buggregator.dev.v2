include:
  - docker-compose.yml

services:
  # ── Traefik (Reverse Proxy) ──────────────────────────────────
  traefik:
    image: traefik:v3.6
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=app-template_app-network
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - app-network
    restart: unless-stopped

  # ── Buggregator (Debug Server) ────────────────────────────────
  buggregator:
    image: ghcr.io/buggregator/server:latest
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.buggregator.rule=Host(`buggregator.app.localhost`)"
      - "traefik.http.routers.buggregator.entrypoints=web"
      - "traefik.http.services.buggregator.loadbalancer.server.port=8000"
    networks:
      - app-network
    restart: unless-stopped

  # ── Buggregator Examples (Demo event sender) ────────────────
  buggregator-examples:
    image: ghcr.io/buggregator/examples:1.7.1
    environment:
      APP_ENV: production
      APP_KEY: base64:kMvf1mHFIuCf+ZqMiId7yo6v4oKtjuWqnlxJTWsWv7k=
      DB_CONNECTION: sqlite
      CACHE_DRIVER: array
      QUEUE_CONNECTION: sync
      BROADCAST_DRIVER: log
      LOG_LEVEL: debug
      MAIL_HOST: buggregator
      MAIL_PORT: 1025
      MAIL_ENCRYPTION: "null"
      MAIL_FROM_ADDRESS: sender@site.com
      MAIL_FROM_NAME: sender
      RAY_HOST: ray@buggregator
      RAY_PORT: 8000
      VAR_DUMPER_SERVER: buggregator:9912
      SENTRY_LARAVEL_DSN: http://sentry@buggregator:8000/123
      LOG_SOCKET_URL: buggregator:9913
      INSPECTOR_URL: http://inspector@buggregator:8000
      INSPECTOR_API_KEY: test
      PROFILER_ENDPOINT: http://profiler@buggregator:8000
      BUGGREGATOR_URL: http://buggregator.app.localhost
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.buggregator-examples.rule=Host(`examples.app.localhost`)"
      - "traefik.http.routers.buggregator-examples.entrypoints=web"
      - "traefik.http.services.buggregator-examples.loadbalancer.server.port=8000"
    depends_on:
      - buggregator
    networks:
      - app-network
    restart: unless-stopped

  # ── Frontend (Nuxt SSR Dev Server with hot reload) ───────────
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    environment:
      NUXT_API_BASE_URL: http://app:8080
      NUXT_PUBLIC_APP_URL: http://app.localhost
      NUXT_PUBLIC_BUGGREGATOR_URL: http://buggregator.app.localhost
      NUXT_EXAMPLES_URL: http://buggregator-examples:8000

  # ── Override app for dev: mount source for live reload ───────
  app:
    volumes:
      - .:/app
      - ${HOME}/.wippy/bin/wippy:/root/.wippy/bin/wippy:ro
    environment:
      APP_BASE_URL: http://app.localhost

volumes:
  frontend-node-modules:
